<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1d1a2b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Curio">
<meta name="description" content="A diary that writes itself — and answers only to you.">
<title>Curio</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-192.png">
<style>
/* Fonts are bundled as system fallbacks so the app is beautiful with the radio off. */

/* ================================================================== *
 * THEMES
 * Every colour in the app resolves through these. A theme is a small
 * block of variables; nothing else in the stylesheet needs to know.
 * ================================================================== */
:root, html[data-theme="dusk"]{
  --surface:#1d1a2b; --surface-2:#252135; --surface-3:#2f2a42;
  --ivory:#f2ebdb;
  --card-bg:#f2ebdb; --card-fg:#2a2118; --card-fg-body:#4a4234;
  --card-fg-soft:#6d6350; --card-line:rgba(42,33,24,.16);
  --brass:#c9a24b; --brass-deep:#a8842f;
  --rose:#b8817e; --sage:#8fa08a; --slate:#7d89a8; --seal:#3a5a45;
  --line:rgba(242,235,219,.14);
  --glow-a:rgba(201,162,75,.16); --glow-b:rgba(184,129,126,.14);
  --page-top:#2b2540; --page-mid:#1d1a2b; --page-bot:#16131f;
}

/* a light room instead of a dark one */
html[data-theme="daylight"]{
  --surface:#f3efe4; --surface-2:#ffffff; --surface-3:#eae4d5;
  --ivory:#2c2419;
  --card-bg:#ffffff; --card-fg:#241d14; --card-fg-body:#4a4234;
  --card-fg-soft:#7a7060; --card-line:rgba(42,33,24,.12);
  --brass:#9a7420; --brass-deep:#7d5d14;
  --rose:#a8615d; --sage:#5f7a5c; --slate:#4f5f80; --seal:#2f5540;
  --line:rgba(42,33,24,.14);
  --glow-a:rgba(154,116,32,.1); --glow-b:rgba(168,97,93,.08);
  --page-top:#faf7ee; --page-mid:#f3efe4; --page-bot:#e9e3d4;
}

/* pure black, for OLED and for people who like quiet */
html[data-theme="ink"]{
  --surface:#000000; --surface-2:#0d0d0f; --surface-3:#17171a;
  --ivory:#eceae6;
  --card-bg:#141416; --card-fg:#eceae6; --card-fg-body:#b8b5ae;
  --card-fg-soft:#84817a; --card-line:rgba(236,234,230,.12);
  --brass:#d8d4cc; --brass-deep:#a9a59d;
  --rose:#c4948f; --sage:#93a48e; --slate:#8b93a6; --seal:#3f5a48;
  --line:rgba(236,234,230,.11);
  --glow-a:rgba(216,212,204,.06); --glow-b:rgba(196,148,143,.05);
  --page-top:#0a0a0c; --page-mid:#000000; --page-bot:#000000;
}

/* deep water and copper */
html[data-theme="harbour"]{
  --surface:#0f2027; --surface-2:#152b33; --surface-3:#1d3942;
  --ivory:#e8f0ef;
  --card-bg:#e8f0ef; --card-fg:#12262c; --card-fg-body:#33484e;
  --card-fg-soft:#5d7178; --card-line:rgba(18,38,44,.15);
  --brass:#d98b4a; --brass-deep:#b06f36;
  --rose:#c9807a; --sage:#7fae9c; --slate:#6f95a8; --seal:#2c5a53;
  --line:rgba(232,240,239,.13);
  --glow-a:rgba(217,139,74,.15); --glow-b:rgba(127,174,156,.12);
  --page-top:#16333c; --page-mid:#0f2027; --page-bot:#081419;
}

/* warm plum and rose gold */
html[data-theme="rosewood"]{
  --surface:#241823; --surface-2:#2e1f2d; --surface-3:#3b2939;
  --ivory:#f4e9e6;
  --card-bg:#f4e9e6; --card-fg:#2a1a24; --card-fg-body:#4d3742;
  --card-fg-soft:#7a6069; --card-line:rgba(42,26,36,.15);
  --brass:#d9a06a; --brass-deep:#b57e4c;
  --rose:#c98a94; --sage:#94a58c; --slate:#8d84a8; --seal:#4a5741;
  --line:rgba(244,233,230,.14);
  --glow-a:rgba(217,160,106,.16); --glow-b:rgba(201,138,148,.15);
  --page-top:#3a2637; --page-mid:#241823; --page-bot:#180f18;
}

/* quiet green, for a calmer diary */
html[data-theme="sage"]{
  --surface:#1a2320; --surface-2:#222e29; --surface-3:#2d3a34;
  --ivory:#ecefe7;
  --card-bg:#f0f2ea; --card-fg:#1d2723; --card-fg-body:#3d4a43;
  --card-fg-soft:#68756c; --card-line:rgba(29,39,35,.15);
  --brass:#c2a95f; --brass-deep:#9d8845;
  --rose:#b98d84; --sage:#8fb08f; --slate:#7c93a0; --seal:#3c6049;
  --line:rgba(236,239,231,.13);
  --glow-a:rgba(194,169,95,.14); --glow-b:rgba(143,176,143,.13);
  --page-top:#26332e; --page-mid:#1a2320; --page-bot:#111815;
}

/* aliases kept so older rules keep working */
:root{ --dusk:var(--surface); --dusk-2:var(--surface-2); --dusk-3:var(--surface-3);
       --ink:var(--card-fg); --ink-soft:var(--card-fg-soft); }

/* switching themes should feel like a light changing, not a page reload */
html{transition:background-color .45s var(--ease-out)}
body,.card,.thread,.worldbox,.storbox,.sheet,.tabs,.topbar,.field,.wide-btn,
.stat,.streakbar,.otd,.holidaybox,.kitinfo,.installbar,.perm-ic{
  transition:background-color .45s ease, color .35s ease, border-color .45s ease;
}

:root{
  /* not themeable: type and the device's safe areas */
  --serif: ui-serif, Georgia, "Times New Roman", serif;
  --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior-y:none}
body{
  background:radial-gradient(120% 80% at 50% -10%, var(--page-top) 0%, var(--page-mid) 55%, var(--page-bot) 100%);
  background-attachment:fixed;
  color:var(--ivory); font-family:var(--serif);
  -webkit-font-smoothing:antialiased; overflow:hidden;
}
#app{height:100%;display:flex;flex-direction:column;max-width:560px;margin:0 auto;position:relative}

/* ---------- top bar ---------- */
.topbar{padding:calc(var(--safe-top) + 16px) 20px 12px;display:flex;align-items:flex-end;
  justify-content:space-between;border-bottom:1px solid var(--line);flex-shrink:0}
.wordmark{display:flex;flex-direction:column;line-height:1}
.wordmark .k{font-family:var(--mono);font-size:9px;letter-spacing:.3em;color:var(--brass);text-transform:uppercase;margin-bottom:5px}
.wordmark .n{font-family:var(--serif);font-weight:500;font-size:26px;letter-spacing:.01em}
.seal-mini{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:8.5px;
  letter-spacing:.1em;color:rgba(242,235,219,.55);text-transform:uppercase;
  border:1px solid var(--line);padding:5px 9px;border-radius:20px}
.seal-dot{width:6px;height:6px;border-radius:50%;background:var(--seal);box-shadow:0 0 0 3px rgba(58,90,69,.25)}
.seal-dot.off{background:var(--brass)}

/* ---------- scroll ---------- */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 20px calc(150px + var(--safe-bottom))}
.body::-webkit-scrollbar{width:0}
.view{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(242,235,219,.45);margin-bottom:6px}
.day-title{font-family:var(--serif);font-weight:500;font-size:25px;line-height:1.14;margin-bottom:3px}
.day-sub{font-style:italic;font-size:15px;color:rgba(242,235,219,.6);margin-bottom:20px}

/* ---------- vitrine ---------- */
.vitrine{position:relative;border-radius:18px;overflow:hidden;margin-bottom:26px;
  background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.55) 100%),linear-gradient(135deg,var(--surface-3),var(--surface-2));
  min-height:190px;display:flex;flex-direction:column;justify-content:flex-end;padding:18px;border:1px solid var(--line)}
.vitrine.has-photo{background:none}
.vitrine img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.vitrine .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,18,28,.15) 30%,rgba(20,18,28,.92) 100%)}
.vitrine::before{content:"";position:absolute;inset:0;
  background-image:radial-gradient(circle at 30% 30%,var(--glow-a),transparent 45%),radial-gradient(circle at 78% 60%,var(--glow-b),transparent 40%)}
.vitrine.has-photo::before{display:none}
.vitrine .acc{position:relative;font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--brass);text-transform:uppercase;margin-bottom:auto}
.vitrine h2{position:relative;font-weight:500;font-size:23px;line-height:1.16;margin:14px 0 4px}
.vitrine p{position:relative;font-size:14.5px;line-height:1.45;color:rgba(242,235,219,.8)}

.rail-label{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(242,235,219,.4);margin:0 0 14px;display:flex;align-items:center;gap:10px}
.rail-label::after{content:"";flex:1;height:1px;background:var(--line)}

/* ---------- cards ---------- */
.card{background:var(--card-bg);color:var(--card-fg);border-radius:13px;padding:15px 16px 14px;margin-bottom:12px;
  position:relative;cursor:pointer;transition:transform .2s;box-shadow:0 10px 24px -14px rgba(0,0,0,.6)}
.card:active{transform:scale(.988)}
.card .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card .acc{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;color:var(--card-fg-soft);text-transform:uppercase}
.card .time{font-family:var(--mono);font-size:10px;color:var(--brass-deep);font-weight:700}
.card h3{font-weight:500;font-size:18px;line-height:1.2;margin-bottom:4px}
.card .placard{font-size:14px;line-height:1.5;color:var(--card-fg-body)}
.card img.thumb{width:100%;border-radius:9px;margin-top:11px;display:block}
.card .tags{display:flex;gap:6px;margin-top:11px;flex-wrap:wrap}
.tag{font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;padding:3px 7px;border-radius:5px;color:#fff}
.tag.photo{background:var(--rose)} .tag.place{background:var(--sage)} .tag.read{background:var(--slate)}
.tag.note{background:#9a8f6f} .tag.meal{background:#a8724e} .tag.person{background:#a0776f}
.card .expand{max-height:0;overflow:hidden;transition:max-height .3s ease}
.card.open .expand{max-height:200px}
.card .expand-inner{border-top:1px solid var(--card-line);margin-top:12px;padding-top:12px}
.card .prov{font-family:var(--mono);font-size:10px;color:var(--card-fg-soft);line-height:1.6;text-transform:uppercase;letter-spacing:.03em}
.card .acts{display:flex;gap:8px;margin-top:12px}
.mini-btn{flex:1;text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  padding:10px;border-radius:8px;border:1px solid var(--card-line);color:var(--card-fg);background:transparent;cursor:pointer}
.mini-btn.forget{border-color:var(--rose);color:var(--rose)}

.withheld{border:1px dashed var(--line);border-radius:13px;padding:15px 16px;margin:6px 0 4px;
  display:flex;gap:12px;align-items:center;background:rgba(58,90,69,.08)}
.withheld .lk{width:34px;height:34px;flex-shrink:0;border-radius:9px;background:rgba(58,90,69,.25);display:grid;place-items:center}
.withheld svg{width:16px;height:16px;stroke:#9fc2ac;fill:none;stroke-width:2}
.withheld p{font-size:13px;line-height:1.45;color:rgba(242,235,219,.72)}
.withheld b{color:var(--ivory)}

.empty{text-align:center;padding:50px 24px;color:rgba(242,235,219,.5)}
.empty h3{font-size:20px;font-weight:500;margin-bottom:8px;color:var(--ivory)}
.empty p{font-size:14.5px;line-height:1.5;font-style:italic}

/* ---------- archive ---------- */
.tl{position:relative;padding-left:26px}
.tl::before{content:"";position:absolute;left:6px;top:6px;bottom:10px;width:1px;background:var(--line)}
.tl-item{position:relative;margin-bottom:18px;cursor:pointer}
.tl-item::before{content:"";position:absolute;left:-24px;top:5px;width:9px;height:9px;border-radius:50%;background:var(--dusk-2);border:2px solid var(--brass)}
.tl-date{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--brass);margin-bottom:3px}
.tl-h{font-weight:500;font-size:18px;line-height:1.18;margin-bottom:3px}
.tl-c{font-size:13.5px;font-style:italic;color:rgba(242,235,219,.55)}
.tl-count{font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:rgba(242,235,219,.4);margin-top:5px;text-transform:uppercase}

.search{width:100%;background:var(--dusk-3);border:1px solid var(--line);color:var(--ivory);
  border-radius:11px;padding:12px 14px;font-family:var(--serif);font-size:15px;margin-bottom:18px}
.search::placeholder{color:rgba(242,235,219,.35)}

/* ---------- threads ---------- */
.thread{background:var(--dusk-3);border:1px solid var(--line);border-radius:14px;padding:16px 17px;margin-bottom:12px;overflow:hidden}
.thread .n{font-weight:600;font-size:32px;line-height:1;color:var(--brass);float:right;margin:-2px 0 0 12px}
.thread h3{font-weight:500;font-size:18px;margin-bottom:5px}
.thread p{font-size:13.5px;line-height:1.5;color:rgba(242,235,219,.65)}
.thread .kind{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:rgba(242,235,219,.4);margin-bottom:9px;display:block}

/* ---------- vault ---------- */
.seal-big{text-align:center;padding:22px 18px;border:1px solid var(--line);border-radius:16px;margin-bottom:22px;
  background:radial-gradient(120% 100% at 50% 0%,rgba(58,90,69,.22),transparent 70%)}
.seal-emblem{width:46px;height:46px;margin:0 auto 12px;border-radius:50%;background:rgba(58,90,69,.3);display:grid;place-items:center;box-shadow:0 0 0 5px rgba(58,90,69,.12)}
.seal-emblem svg{width:22px;height:22px;stroke:#a6cbb3;fill:none;stroke-width:2}
.seal-big h3{font-weight:500;font-size:19px;margin-bottom:6px}
.seal-big p{font-size:13.5px;line-height:1.5;color:rgba(242,235,219,.62);max-width:280px;margin:0 auto}
.row{display:flex;align-items:center;justify-content:space-between;padding:13px 2px;border-bottom:1px solid var(--line);gap:14px}
.row:last-child{border-bottom:none}
.row .rl .t{font-size:15px;font-weight:500;display:block}
.row .rl .d{font-family:var(--mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:rgba(242,235,219,.4)}
.toggle{width:44px;height:26px;border-radius:20px;background:var(--dusk-3);position:relative;flex-shrink:0;cursor:pointer;transition:background .2s;border:1px solid var(--line)}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--ivory);transition:transform .2s;box-shadow:0 2px 4px rgba(0,0,0,.4)}
.toggle.on{background:var(--brass-deep);border-color:var(--brass-deep)}
.toggle.on::after{transform:translateX(18px)}
.toggle.locked{background:var(--seal);border-color:var(--seal);cursor:not-allowed}
.toggle.locked::after{transform:translateX(18px);background:#cfe3d6}
.discard-note{background:rgba(201,162,75,.08);border:1px solid rgba(201,162,75,.25);border-radius:12px;
  padding:14px 15px;font-size:13.5px;line-height:1.5;color:rgba(242,235,219,.75);margin-bottom:14px}
.discard-note b{color:var(--brass)}
.wide-btn{width:100%;padding:13px;border-radius:11px;border:1px solid var(--line);background:var(--dusk-3);
  color:var(--ivory);font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;cursor:pointer}
.wide-btn.danger{border-color:rgba(184,129,126,.5);color:var(--rose)}

/* ---------- capture sheet ---------- */
.fab{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(88px + var(--safe-bottom));
  width:58px;height:58px;border-radius:50%;background:var(--brass);border:none;color:#231d10;
  font-size:30px;line-height:1;display:grid;place-items:center;cursor:pointer;z-index:35;
  box-shadow:0 10px 26px -6px rgba(0,0,0,.7)}
.sheet-bg{position:fixed;inset:0;background:rgba(10,8,16,.6);backdrop-filter:blur(3px);z-index:50;display:none}
.sheet-bg.open{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:51;background:var(--dusk-2);
  border-radius:22px 22px 0 0;border-top:1px solid var(--line);padding:18px 20px calc(24px + var(--safe-bottom));
  transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.8,.3,1);max-width:560px;margin:0 auto}
.sheet.open{transform:none}
.sheet .grab{width:38px;height:4px;border-radius:4px;background:var(--line);margin:0 auto 16px}
.sheet h3{font-weight:500;font-size:20px;margin-bottom:4px}
.sheet .hint{font-size:13.5px;font-style:italic;color:rgba(242,235,219,.55);margin-bottom:16px}
.kinds{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kind{background:var(--dusk-3);border:1px solid var(--line);border-radius:13px;padding:14px 8px;text-align:center;cursor:pointer}
.kind span{display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:rgba(242,235,219,.7);margin-top:7px}
.kind svg{width:22px;height:22px;stroke:var(--brass);fill:none;stroke-width:1.6}
.field{width:100%;background:var(--dusk-3);border:1px solid var(--line);color:var(--ivory);border-radius:11px;
  padding:13px 14px;font-family:var(--serif);font-size:16px;margin-bottom:12px}
.field::placeholder{color:rgba(242,235,219,.35)}
textarea.field{min-height:96px;resize:none;line-height:1.45}
.sheet-actions{display:flex;gap:10px;margin-top:4px}
.sheet-actions button{flex:1;padding:13px;border-radius:11px;font-family:var(--mono);font-size:11px;
  letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--ivory)}
.sheet-actions button.primary{background:var(--brass);border-color:var(--brass);color:#231d10;font-weight:700}
.preview{width:100%;border-radius:11px;margin-bottom:12px;display:block}

/* ---------- tabs ---------- */
.tabs{position:fixed;bottom:0;left:0;right:0;height:calc(72px + var(--safe-bottom));
  background:rgba(24,20,33,.94);backdrop-filter:blur(16px);border-top:1px solid var(--line);
  display:flex;align-items:flex-start;justify-content:space-around;padding:11px 8px 0;z-index:30;
  max-width:560px;margin:0 auto}
.tab{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex:1;background:none;border:none;padding:2px 0}
.tab svg{width:21px;height:21px;stroke:rgba(242,235,219,.45);fill:none;stroke-width:1.6;transition:stroke .2s}
.tab span{font-family:var(--mono);font-size:8.5px;letter-spacing:.09em;text-transform:uppercase;color:rgba(242,235,219,.4);transition:color .2s}
.tab.active svg{stroke:var(--brass)} .tab.active span{color:var(--brass)}

/* ---------- toast ---------- */
.toast{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:calc(160px + var(--safe-bottom));
  background:var(--card-bg);color:var(--card-fg);padding:11px 18px;border-radius:22px;font-size:14px;z-index:60;
  opacity:0;transition:all .3s;pointer-events:none;max-width:88%;text-align:center;box-shadow:0 12px 30px -8px rgba(0,0,0,.6)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.warn{background:#3a2a28;color:#f4d9d6}

/* ---------- select / language ---------- */
select.field.select{appearance:none;-webkit-appearance:none;background-image:
  linear-gradient(45deg,transparent 50%,var(--brass) 50%),linear-gradient(135deg,var(--brass) 50%,transparent 50%);
  background-position:calc(100% - 19px) calc(1.15em),calc(100% - 14px) calc(1.15em);
  background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:38px}
[dir=rtl] select.field.select{background-position:19px calc(1.15em),14px calc(1.15em);padding-right:14px;padding-left:38px}
select.field.select option{background:var(--dusk-2);color:var(--ivory)}

/* ---------- onboarding permissions ---------- */
.perm-row{display:flex;align-items:center;gap:13px;padding:13px 2px;border-bottom:1px solid var(--line)}
.perm-row:last-child{border-bottom:none}
.perm-ic{width:38px;height:38px;flex-shrink:0;border-radius:11px;background:var(--dusk-3);display:grid;place-items:center}
.perm-ic svg{width:19px;height:19px;stroke:var(--brass);fill:none;stroke-width:1.6}
.perm-tx{flex:1;min-width:0}
.perm-tx .t{display:block;font-size:15.5px;font-weight:500}
.perm-tx .d{display:block;font-size:12.5px;line-height:1.35;color:rgba(242,235,219,.5);margin-top:2px}
.perm-btn{flex-shrink:0;padding:8px 13px;border-radius:9px;border:1px solid var(--brass);background:transparent;
  color:var(--brass);font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
.perm-btn.ok{background:var(--seal);border-color:var(--seal);color:#cfe3d6}
.perm-btn.no{border-color:rgba(242,235,219,.2);color:rgba(242,235,219,.45)}
.perm-btn:disabled{opacity:.85}
.wide-btn.primary{background:var(--brass);border-color:var(--brass);color:#231d10;font-weight:700}
.hint{font-size:13.5px;font-style:italic;color:rgba(242,235,219,.55)}

/* ---------- in-app camera ---------- */
.camwrap{position:relative;border-radius:14px;overflow:hidden;margin-bottom:12px;background:#000;aspect-ratio:3/4}
.camwrap video{width:100%;height:100%;object-fit:cover;display:block}
.shutter{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);width:58px;height:58px;border-radius:50%;
  background:var(--card-bg);border:4px solid rgba(255,255,255,.45);cursor:pointer;padding:0}
.shutter:active{transform:translateX(-50%) scale(.93)}
.camswitch{position:absolute;top:12px;right:12px;background:rgba(20,18,28,.65);border:1px solid var(--line);
  color:var(--ivory);border-radius:20px;padding:7px 12px;font-family:var(--mono);font-size:9px;
  letter-spacing:.08em;text-transform:uppercase;cursor:pointer;backdrop-filter:blur(6px)}
[dir=rtl] .camswitch{right:auto;left:12px}


/* ================= DESKTOP / LAPTOP LAYOUT ================= */
@media (min-width:900px){
  body{padding:0;overflow:auto}
  #app{max-width:1120px;flex-direction:row;min-height:100vh;gap:0}
  .topbar{display:none}
  .tabs{position:sticky;top:0;left:auto;right:auto;height:100vh;width:216px;flex-shrink:0;
    flex-direction:column;justify-content:flex-start;align-items:stretch;gap:4px;
    padding:30px 14px;border-top:none;border-right:1px solid var(--line);
    background:rgba(24,20,33,.6);max-width:none;margin:0;backdrop-filter:none}
  .tabs::before{content:"Curio";font-family:var(--serif);font-size:26px;font-weight:500;
    color:var(--ivory);padding:0 12px 22px;letter-spacing:.01em}
  .tab{flex:0 0 auto;flex-direction:row;justify-content:flex-start;gap:12px;padding:11px 12px;border-radius:10px}
  .tab:hover{background:rgba(242,235,219,.05)}
  .tab.active{background:rgba(201,162,75,.11)}
  .tab span{font-size:12px;letter-spacing:.06em;text-transform:none;font-family:var(--serif)}
  .tab.active span{color:var(--brass)}
  .body{padding:38px 44px 80px;max-width:720px}
  .fab{left:auto;right:40px;bottom:34px;transform:none;width:62px;height:62px}
  .fab:active{transform:scale(.95)}
  .sheet{max-width:520px;border-radius:20px;left:50%;transform:translate(-50%,120%);
    bottom:auto;top:50%;margin-top:-1px}
  .sheet.open{transform:translate(-50%,-50%)}
  .toast{bottom:40px}
  .desktop-only{display:block}
}
@media (max-width:899px){ .desktop-only{display:none} }

/* ================= STREAK BAR ================= */
.streakbar{display:flex;align-items:center;gap:14px;background:var(--dusk-2);border:1px solid var(--line);
  border-radius:14px;padding:13px 16px;margin-bottom:20px}
.streakbar .flame{font-size:22px;line-height:1}
.streakbar .sk{flex:1;min-width:0}
.streakbar .sk .n{font-family:var(--serif);font-size:17px;font-weight:500;display:block}
.streakbar .sk .d{font-family:var(--mono);font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:rgba(242,235,219,.45)}
.streakbar .best{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--brass);border:1px solid rgba(201,162,75,.3);border-radius:20px;padding:5px 10px;flex-shrink:0}

/* ================= ON THIS DAY ================= */
.otd{background:linear-gradient(135deg,rgba(201,162,75,.14),rgba(184,129,126,.09));
  border:1px solid rgba(201,162,75,.28);border-radius:16px;padding:16px 17px;margin-bottom:20px}
.otd .lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--brass);margin-bottom:12px;display:block}
.otd .item{padding:10px 0;border-top:1px solid rgba(201,162,75,.18)}
.otd .item:first-of-type{border-top:none;padding-top:0}
.otd .ago{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(242,235,219,.5);display:block;margin-bottom:3px}
.otd h4{font-family:var(--serif);font-size:16.5px;font-weight:500;margin-bottom:3px}
.otd p{font-size:13.5px;line-height:1.45;color:rgba(242,235,219,.7)}
.otd img{width:100%;border-radius:10px;margin-top:9px;display:block}

/* ================= MOOD ================= */
.moodrow{display:flex;gap:8px;margin-bottom:14px}
.moodbtn{flex:1;background:var(--dusk-3);border:1px solid var(--line);border-radius:12px;
  padding:12px 4px;cursor:pointer;text-align:center;transition:all .16s}
.moodbtn .face{font-size:21px;line-height:1;display:block}
.moodbtn .lb{font-family:var(--mono);font-size:8px;letter-spacing:.05em;text-transform:uppercase;
  color:rgba(242,235,219,.5);margin-top:6px;display:block}
.moodbtn.on{background:rgba(201,162,75,.18);border-color:var(--brass)}
.moodbtn.on .lb{color:var(--brass)}
.card .moodchip{display:inline-block;margin-left:8px;font-size:13px}

/* ================= YEAR IN PIXELS ================= */
.year{display:grid;grid-template-columns:repeat(auto-fill,minmax(9px,1fr));gap:3px;margin:6px 0 8px}
.px{aspect-ratio:1;border-radius:2px;background:rgba(242,235,219,.06)}
.px.l1{background:rgba(201,162,75,.28)} .px.l2{background:rgba(201,162,75,.5)}
.px.l3{background:rgba(201,162,75,.72)} .px.l4{background:var(--brass)}
.monthrow{display:flex;justify-content:space-between;font-family:var(--mono);font-size:8px;
  letter-spacing:.06em;text-transform:uppercase;color:rgba(242,235,219,.35);margin-bottom:16px}

/* ================= STATS ================= */
.statgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--dusk-2);border:1px solid var(--line);border-radius:13px;padding:15px 16px}
.stat .v{font-family:var(--serif);font-size:26px;font-weight:500;color:var(--brass);line-height:1}
.stat .k{font-family:var(--mono);font-size:9px;letter-spacing:.11em;text-transform:uppercase;
  color:rgba(242,235,219,.45);margin-top:6px;display:block}

/* ================= BACKUP BANNER ================= */
.banner{border-radius:14px;padding:14px 16px;margin-bottom:18px;display:flex;gap:13px;align-items:flex-start;cursor:pointer}
.banner.warn{background:rgba(201,162,75,.1);border:1px solid rgba(201,162,75,.35)}
.banner.urgent{background:rgba(184,129,126,.12);border:1px solid rgba(184,129,126,.45)}
.banner.ok{background:rgba(58,90,69,.12);border:1px solid rgba(58,90,69,.4)}
.banner .bi{width:34px;height:34px;flex-shrink:0;border-radius:10px;display:grid;place-items:center;background:rgba(0,0,0,.2)}
.banner .bi svg{width:17px;height:17px;fill:none;stroke-width:1.8;stroke:var(--brass)}
.banner.urgent .bi svg{stroke:var(--rose)} .banner.ok .bi svg{stroke:#9fc2ac}
.banner .bt{flex:1;min-width:0}
.banner .bt b{display:block;font-family:var(--serif);font-size:15px;font-weight:500;margin-bottom:2px}
.banner .bt span{font-size:13px;line-height:1.4;color:rgba(242,235,219,.65)}

/* ================= RECOVERY ================= */
.pass-wrap{position:relative;margin-bottom:10px}
.strength-bar{height:4px;border-radius:3px;background:var(--dusk-3);overflow:hidden;margin:-4px 0 10px}
.strength-bar i{display:block;height:100%;transition:all .25s;border-radius:3px}
.sb-weak{width:22%;background:var(--rose)} .sb-fair{width:48%;background:#c9884b}
.sb-good{width:75%;background:var(--brass)} .sb-strong{width:100%;background:var(--seal)}
.fingerprint{font-family:var(--mono);font-size:17px;letter-spacing:.22em;color:var(--brass);
  text-align:center;padding:14px;background:var(--dusk-3);border:1px solid var(--line);
  border-radius:12px;margin-bottom:10px}
.kitinfo{background:var(--dusk-3);border:1px solid var(--line);border-radius:12px;padding:14px 15px;margin-bottom:12px}
.kitinfo b{color:var(--brass);font-style:normal}

/* ================= LOCK SCREEN ================= */
.lockscreen{position:fixed;inset:0;z-index:200;background:var(--surface);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 26px;gap:16px}
.lockscreen .emblem{width:64px;height:64px;border-radius:50%;background:rgba(58,90,69,.28);
  display:grid;place-items:center;box-shadow:0 0 0 7px rgba(58,90,69,.11);margin-bottom:6px}
.lockscreen .emblem svg{width:29px;height:29px;stroke:#a6cbb3;fill:none;stroke-width:2}
.lockscreen h2{font-family:var(--serif);font-size:23px;font-weight:500}
.lockscreen input{width:210px;text-align:center;letter-spacing:.4em;font-family:var(--mono);font-size:19px}
.lockscreen .err{color:var(--rose);font-style:italic;font-size:14px;min-height:20px}

/* ================= MISC ================= */
.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.pill{border:1px solid var(--line);border-radius:20px;padding:8px 13px;font-family:var(--mono);
  font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:rgba(242,235,219,.7);
  background:var(--dusk-2);cursor:pointer}
.pill.on{background:var(--brass);border-color:var(--brass);color:#231d10;font-weight:700}
.corr{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line)}
.corr:last-child{border-bottom:none}
.corr .cl{font-size:15px}
.corr .cv{font-family:var(--mono);font-size:11px;font-weight:700}
.corr .cv.up{color:#8fa08a} .corr .cv.down{color:var(--rose)}
input[type=time].field{color-scheme:dark}


/* ================= INSTALL BAR ================= */
.installbar{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,rgba(201,162,75,.16),rgba(184,129,126,.1));
  border:1px solid rgba(201,162,75,.34);border-radius:14px;padding:13px 14px;margin-bottom:16px}
.installbar .ib-tx{flex:1;min-width:0}
.installbar .ib-tx b{display:block;font-family:var(--serif);font-size:15px;font-weight:500;margin-bottom:2px}
.installbar .ib-tx span{font-size:12.5px;line-height:1.4;color:rgba(242,235,219,.65)}
.ib-go{flex-shrink:0;background:var(--brass);border:none;color:#231d10;border-radius:20px;padding:9px 15px;
  font-family:var(--mono);font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;font-weight:700;cursor:pointer}
.ib-x{flex-shrink:0;background:none;border:none;color:rgba(242,235,219,.45);font-size:22px;line-height:1;cursor:pointer;padding:0 4px}

/* buttons that carry an icon */
.wide-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;
  vertical-align:-2px;margin-inline-end:7px}


/* ================= POLISH ================= */
/* respect people who asked their device for less motion */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;transition-duration:.001ms!important}
}
/* visible focus, for keyboards and switch controls */
:focus-visible{outline:2px solid var(--brass);outline-offset:3px;border-radius:6px}
.tab:focus-visible,.toggle:focus-visible{outline-offset:2px}
/* nicer text selection */
::selection{background:rgba(201,162,75,.3);color:var(--ivory)}
/* keyboard hints, desktop only */
.kbd-hint{display:none}
@media (min-width:900px){
  .kbd-hint{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.08em;
    text-transform:uppercase;color:rgba(242,235,219,.3);padding:16px 12px 0;line-height:1.9}
  .kbd-hint b{color:rgba(242,235,219,.55);font-weight:400}
}


/* ================= VOICE RECORDER ================= */
.recorder{display:flex;flex-direction:column;align-items:center;gap:10px;
  background:var(--dusk-3);border:1px solid var(--line);border-radius:16px;padding:22px 16px;margin-bottom:12px}
.recbtn{width:74px;height:74px;border-radius:50%;border:3px solid rgba(184,129,126,.5);
  background:rgba(184,129,126,.14);display:grid;place-items:center;cursor:pointer;transition:all .2s}
.recbtn .dot{width:26px;height:26px;border-radius:50%;background:var(--rose);transition:all .22s}
.recbtn.on{border-color:var(--rose);background:rgba(184,129,126,.3);animation:pulse 1.6s ease-in-out infinite}
.recbtn.on .dot{border-radius:5px;width:22px;height:22px}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(184,129,126,.35)}50%{box-shadow:0 0 0 14px rgba(184,129,126,0)}}
.rectime{font-family:var(--mono);font-size:26px;color:var(--ivory);letter-spacing:.06em}
.rechint{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:rgba(242,235,219,.5)}
.cardaudio{width:100%;margin-top:11px;height:36px;display:block;border-radius:8px}

/* ================= TODAY IN HISTORY ================= */
.worldbox{background:var(--dusk-2);border:1px solid var(--line);border-radius:16px;
  padding:16px 17px;margin-bottom:22px;position:relative;overflow:hidden}
.worldbox::before{content:"";position:absolute;inset:0;
  background:radial-gradient(70% 90% at 88% 0%,rgba(125,137,168,.16),transparent 60%);pointer-events:none}
.worldbox .lbl{position:relative;display:flex;align-items:center;gap:8px;font-family:var(--mono);
  font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--slate);margin-bottom:14px}
.worldbox .lbl svg{width:14px;height:14px;stroke:var(--slate);fill:none;stroke-width:1.6}
.witem{position:relative;padding:11px 0;border-top:1px solid var(--line)}
.witem:first-of-type{border-top:none;padding-top:0}
.wyear{display:flex;align-items:baseline;gap:9px;font-family:var(--mono);font-size:17px;
  color:var(--ivory);font-weight:700;letter-spacing:.04em;margin-bottom:5px}
.wago{font-size:9px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:rgba(242,235,219,.38)}
.witem p{font-size:14.5px;line-height:1.5;color:rgba(242,235,219,.78)}
.wtag{display:inline-block;margin-top:9px;font-family:var(--mono);font-size:8px;letter-spacing:.1em;
  text-transform:uppercase;padding:3px 8px;border-radius:5px;color:#fff;opacity:.9}
.t-science{background:#5f7f8c} .t-politics{background:#7d89a8} .t-culture{background:#a0776f}
.t-rights{background:#8fa08a} .t-exploration{background:#8a7fa8} .t-tech{background:#a8844f}
.t-disaster{background:#96605c} .t-sport{background:#6f8f76}
.wmore{position:relative;width:100%;margin-top:12px;background:none;border:1px solid var(--line);
  color:rgba(242,235,219,.7);border-radius:10px;padding:9px;font-family:var(--mono);
  font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}


/* ================= STORAGE PANEL ================= */
.storbox{background:var(--dusk-2);border:1px solid var(--line);border-radius:16px;padding:17px 18px;margin-bottom:4px}
.storhead{display:flex;align-items:baseline;justify-content:space-between;gap:12px}
.stotal{font-family:var(--serif);font-size:31px;font-weight:500;color:var(--ivory);line-height:1}
.sstate{font-family:var(--mono);font-size:9px;letter-spacing:.11em;text-transform:uppercase;
  padding:5px 10px;border-radius:20px;border:1px solid}
.s-comfortable{color:var(--sage);border-color:rgba(143,160,138,.4)}
.s-moderate{color:var(--brass);border-color:rgba(201,162,75,.4)}
.s-high{color:#c9884b;border-color:rgba(201,136,75,.45)}
.s-critical{color:var(--rose);border-color:rgba(184,129,126,.5)}
.s-unknown{color:rgba(242,235,219,.4);border-color:var(--line)}
.ssub{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;
  color:rgba(242,235,219,.4);margin-top:6px}
.sbar{display:flex;height:10px;border-radius:6px;overflow:hidden;background:var(--dusk-3);margin:15px 0 12px;gap:2px}
.sbar i{display:block;height:100%;border-radius:3px}
.b-photo{background:var(--rose)} .b-audio{background:var(--slate)} .b-text{background:var(--sage)}
.skeys{display:flex;flex-wrap:wrap;gap:14px}
.skey{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9.5px;
  letter-spacing:.06em;text-transform:uppercase;color:rgba(242,235,219,.5)}
.skey i{width:8px;height:8px;border-radius:2px;display:block}
.skey b{color:var(--ivory);font-weight:400;margin-inline-start:3px}
.snote{margin-top:13px;padding-top:12px;border-top:1px solid var(--line);
  font-size:13px;line-height:1.5;color:rgba(242,235,219,.62);font-style:italic}
.wide-btn .saves{float:right;color:var(--sage);font-weight:700}
[dir=rtl] .wide-btn .saves{float:left}


/* ================================================================== *
 * MOTION
 * Everything here is short, eased and purposeful. Nothing bounces for
 * the sake of it, and all of it disappears under prefers-reduced-motion.
 * ================================================================== */
:root{
  --ease-out: cubic-bezier(.22,.9,.3,1);
  --ease-spring: cubic-bezier(.34,1.56,.5,1);
}

/* views arrive from just below, never a hard cut */
.view{animation:viewIn .42s var(--ease-out) both}
@keyframes viewIn{
  from{opacity:0;transform:translateY(14px) scale(.995)}
  to{opacity:1;transform:none}
}

/* cards deal themselves out, one after another */
.card,.thread,.tl-item,.stat,.perm-row{animation:dealIn .5s var(--ease-out) both}
@keyframes dealIn{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:none}
}
.card:nth-child(1),.thread:nth-child(1){animation-delay:.02s}
.card:nth-child(2),.thread:nth-child(2){animation-delay:.07s}
.card:nth-child(3),.thread:nth-child(3){animation-delay:.12s}
.card:nth-child(4),.thread:nth-child(4){animation-delay:.17s}
.card:nth-child(5),.thread:nth-child(5){animation-delay:.22s}
.card:nth-child(n+6){animation-delay:.26s}
.stat:nth-child(2){animation-delay:.05s}
.stat:nth-child(3){animation-delay:.1s}
.stat:nth-child(4){animation-delay:.15s}
.tl-item:nth-child(odd){animation-delay:.04s}

/* the vitrine lifts into its case */
.vitrine{animation:vitrineIn .6s var(--ease-out) both}
@keyframes vitrineIn{
  from{opacity:0;transform:translateY(20px) scale(.98)}
  to{opacity:1;transform:none}
}

/* the greeting writes itself in */
.hello{animation:helloIn .55s var(--ease-out) both}
@keyframes helloIn{
  from{opacity:0;transform:translateY(-8px)}
  to{opacity:1;transform:none}
}

/* pressable things answer the finger */
.card:active{transform:scale(.985)}
.wide-btn,.mini-btn,.pill,.kind,.tab,.perm-btn,.moodbtn{transition:transform .16s var(--ease-out),background .2s,border-color .2s,color .2s}
.wide-btn:active,.mini-btn:active,.pill:active,.kind:active,.perm-btn:active{transform:scale(.97)}
.kind:active{background:rgba(201,162,75,.14)}
.moodbtn:active{transform:scale(.93)}
.moodbtn.on{animation:moodPop .34s var(--ease-spring)}
@keyframes moodPop{0%{transform:scale(1)}45%{transform:scale(1.14)}100%{transform:scale(1)}}

/* the capture button breathes very slightly, so it reads as the way in */
.fab{transition:transform .2s var(--ease-spring),box-shadow .25s}
.fab:active{transform:translateX(-50%) scale(.9)}
@media (min-width:900px){ .fab:active{transform:scale(.9)} }
.fab::after{content:"";position:absolute;inset:-6px;border-radius:50%;
  border:1.5px solid rgba(201,162,75,.4);opacity:0;animation:halo 3.6s ease-in-out infinite}
@keyframes halo{
  0%,100%{opacity:0;transform:scale(.9)}
  40%{opacity:.55;transform:scale(1)}
  70%{opacity:0;transform:scale(1.12)}
}

/* the sheet springs up rather than sliding flatly */
.sheet{transition:transform .38s var(--ease-spring)}
.sheet-bg{transition:opacity .28s ease}
.sheet-bg{opacity:0} .sheet-bg.open{opacity:1}

/* toast */
.toast{transition:opacity .28s var(--ease-out),transform .34s var(--ease-spring)}

/* the streak flame flickers when it is alive */
.streakbar .flame{display:inline-block;animation:flicker 2.8s ease-in-out infinite;transform-origin:50% 90%}
@keyframes flicker{
  0%,100%{transform:scale(1) rotate(0)}
  30%{transform:scale(1.07) rotate(-3deg)}
  60%{transform:scale(.97) rotate(2deg)}
}

/* today in history slides in from the side it belongs to */
.worldbox{animation:worldIn .55s var(--ease-out) .08s both}
@keyframes worldIn{
  from{opacity:0;transform:translateX(14px)}
  to{opacity:1;transform:none}
}
@keyframes worldInRtl{
  from{opacity:0;transform:translateX(-14px)}
  to{opacity:1;transform:none}
}
[dir=rtl] .worldbox{animation-name:worldInRtl}

/* on-this-day glows once, then settles */
.otd{animation:otdIn .6s var(--ease-out) both}
@keyframes otdIn{
  from{opacity:0;transform:translateY(12px);box-shadow:0 0 0 0 rgba(201,162,75,0)}
  60%{box-shadow:0 0 40px -8px rgba(201,162,75,.32)}
  to{opacity:1;transform:none;box-shadow:0 0 0 0 rgba(201,162,75,0)}
}

/* the storage bar fills rather than appearing */
.sbar i{animation:fillBar .8s var(--ease-out) both}
@keyframes fillBar{from{width:0 !important}}

/* the year grid lights up left to right */
.px{animation:pixIn .5s ease both}
@keyframes pixIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:none}}

/* birthday: a quiet celebration, not confetti everywhere */
.birthday{position:relative;overflow:hidden;
  background:linear-gradient(135deg,rgba(201,162,75,.2),rgba(184,129,126,.14));
  border:1px solid rgba(201,162,75,.42);border-radius:16px;padding:18px;margin-bottom:20px;
  animation:otdIn .7s var(--ease-out) both}
.birthday::after{content:"";position:absolute;top:-60%;left:-30%;width:60%;height:220%;
  background:linear-gradient(90deg,transparent,rgba(242,235,219,.14),transparent);
  transform:rotate(18deg);animation:sheen 4.5s ease-in-out infinite}
@keyframes sheen{0%{left:-40%}55%{left:120%}100%{left:120%}}
.birthday .bk{font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--brass);display:block;margin-bottom:9px;position:relative}
.birthday h3{font-family:var(--serif);font-size:22px;font-weight:500;margin-bottom:5px;position:relative}
.birthday p{font-size:14.5px;line-height:1.5;color:rgba(242,235,219,.75);position:relative}

/* holiday card */
.holidaybox{background:var(--dusk-2);border:1px solid var(--line);border-left:3px solid var(--sage);
  border-radius:14px;padding:14px 16px;margin-bottom:20px;animation:dealIn .5s var(--ease-out) .06s both}
[dir=rtl] .holidaybox{border-left:1px solid var(--line);border-right:3px solid var(--sage)}
.holidaybox .hk{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--sage);display:block;margin-bottom:6px}
.holidaybox h4{font-family:var(--serif);font-size:18px;font-weight:500;margin-bottom:3px}
.holidaybox p{font-size:13px;line-height:1.45;color:rgba(242,235,219,.6)}

/* the greeting block */
.hello{margin-bottom:16px}
.hello .g{font-family:var(--serif);font-size:26px;font-weight:500;line-height:1.15;color:var(--ivory)}
.hello .sub{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(242,235,219,.42);margin-top:6px}

/* ================================================================== *
 * DEVICE-AWARE LAYOUT
 * ================================================================== */
/* tablets: two columns, but keep finger-sized targets */
@media (min-width:700px) and (max-width:1099px){
  html[data-device="tablet"] .body{padding:26px 34px calc(150px + var(--safe-bottom));max-width:none}
  html[data-device="tablet"] #app{max-width:900px}
  html[data-device="tablet"] .statgrid{grid-template-columns:repeat(4,1fr)}
  html[data-device="tablet"] .kinds{grid-template-columns:repeat(4,1fr)}
  html[data-device="tablet"] .sheet{max-width:620px;left:50%;transform:translate(-50%,100%)}
  html[data-device="tablet"] .sheet.open{transform:translate(-50%,0)}
}
/* touch devices get larger hit areas everywhere */
html.is-touch .mini-btn{padding:13px 10px}
html.is-touch .tab{padding:4px 0}
html.is-touch .pill{padding:11px 15px}
/* mouse devices get hover states; touch devices must not inherit sticky ones */
html.is-hover .card:hover{box-shadow:0 14px 30px -14px rgba(0,0,0,.7);transform:translateY(-1px)}
html.is-hover .wide-btn:hover{border-color:rgba(201,162,75,.45)}
html.is-hover .tl-item:hover .tl-h{color:var(--brass)}
html.is-hover .kind:hover{border-color:rgba(201,162,75,.4)}
/* installed apps lose the browser chrome, so give the top a little more room */
html[data-standalone="true"] .topbar{padding-top:calc(var(--safe-top) + 22px)}


/* ================= MEETING ================= */
.consentbox{background:rgba(184,129,126,.1);border:1px solid rgba(184,129,126,.4);
  border-radius:14px;padding:16px 17px;margin-bottom:14px}
.consentbox p{font-size:14px;line-height:1.55;color:rgba(242,235,219,.8);margin-bottom:10px}
.consentbox p:last-child{margin-bottom:0}
.consentbox .say{font-style:italic;color:var(--brass);padding-top:10px;
  border-top:1px solid rgba(184,129,126,.28)}

.meetscreen{position:fixed;inset:0;z-index:150;background:
  radial-gradient(110% 70% at 50% 0%,var(--page-top),var(--page-mid) 60%,var(--page-bot));
  display:flex;flex-direction:column;padding:calc(var(--safe-top) + 20px) 20px calc(16px + var(--safe-bottom));
  max-width:560px;margin:0 auto;animation:viewIn .4s var(--ease-out) both}
@media (min-width:900px){ .meetscreen{max-width:680px;padding-inline:36px} }
.meethead{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:16px}
.meethead h2{font-family:var(--serif);font-size:23px;font-weight:500;line-height:1.2;margin-top:4px}
.mlive{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:9.5px;
  letter-spacing:.2em;text-transform:uppercase;color:var(--rose)}
.mlive .pip{width:9px;height:9px;border-radius:50%;background:var(--rose);
  animation:livepip 1.5s ease-in-out infinite}
@keyframes livepip{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(184,129,126,.5)}
  60%{opacity:.55;box-shadow:0 0 0 10px rgba(184,129,126,0)}}
.mclock{font-family:var(--mono);font-size:29px;color:var(--ivory);letter-spacing:.04em;flex-shrink:0}

.mtranscript{flex:1;min-height:110px;background:var(--dusk-2);border:1px solid var(--line);
  border-radius:14px;padding:14px 15px;margin-bottom:12px;overflow:hidden;display:flex;flex-direction:column}
.mtranscript .tlabel{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--slate);margin-bottom:9px;flex-shrink:0}
.mtranscript p{flex:1;overflow-y:auto;font-size:14.5px;line-height:1.6;color:rgba(242,235,219,.74);
  white-space:pre-wrap}
.mnotes{min-height:90px;margin-bottom:10px}
.mmarks{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;min-height:4px}
.markchip{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;padding:5px 10px;border-radius:16px;
  background:rgba(201,162,75,.16);border:1px solid rgba(201,162,75,.35);color:var(--brass);
  animation:moodPop .3s var(--ease-spring)}
.mfoot{flex-shrink:0}
.mrow{display:flex;gap:10px}
.mrow .wide-btn{margin-bottom:0}

/* the write-up inside a card */
.meetsum{margin-bottom:12px}
.msec{margin-bottom:11px}
.msec span{display:block;font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--card-fg-soft);margin-bottom:4px}
.msec ul{margin:0;padding-inline-start:15px}
.msec li{font-size:13.5px;line-height:1.5;color:var(--card-fg-body);margin-bottom:3px}
.msec p{font-size:13.5px;line-height:1.5;color:var(--card-fg-body)}


/* ================= THEME PICKER ================= */
.themegrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:8px}
@media (min-width:700px){ .themegrid{grid-template-columns:repeat(3,1fr)} }
.swatch{background:var(--surface-2);border:1px solid var(--line);border-radius:14px;
  padding:12px 12px 11px;cursor:pointer;text-align:start;transition:all .22s var(--ease-out);
  display:flex;flex-direction:column;gap:9px}
.swatch.wide{grid-column:1/-1;flex-direction:row;align-items:center;gap:12px}
.swatch:active{transform:scale(.97)}
.swatch.on{border-color:var(--brass);background:color-mix(in srgb,var(--brass) 12%,var(--surface-2))}
html.is-hover .swatch:hover{border-color:color-mix(in srgb,var(--brass) 45%,transparent)}
.swatch .chips{display:flex;gap:5px}
.swatch .chips i{width:22px;height:22px;border-radius:7px;display:block;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.09)}
.swatch .sname{font-family:var(--serif);font-size:13.5px;color:var(--ivory);line-height:1.25}
.swatch.on .sname{color:var(--brass)}
/* These two are deliberately literal: the "follow my device" swatch previews
   both palettes at once, so it cannot use the palette that is currently on. */
.chips i.sysdark{background:linear-gradient(135deg,#1d1a2b 50%,#c9a24b 50%)}
.chips i.syslight{background:linear-gradient(135deg,#f3efe4 50%,#9a7420 50%)}

/* the whole app cross-fades when the room changes */
@keyframes themeWash{from{opacity:.55}to{opacity:1}}
html[data-theme] body{animation:themeWash .5s ease}


/* ================= SEARCH SUGGESTIONS ================= */
.tips{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin:-8px 0 16px;
  font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(242,235,219,.4)}
.tip{background:var(--surface-3);border:1px solid var(--line);color:var(--brass);
  border-radius:16px;padding:5px 11px;font-family:var(--mono);font-size:9.5px;
  letter-spacing:.06em;cursor:pointer}
mark{background:color-mix(in srgb,var(--brass) 34%,transparent);color:inherit;
  border-radius:3px;padding:0 2px}

/* ================= TIME CAPSULE ================= */
details.capsule{border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:12px;
  background:var(--surface-2)}
details.capsule summary{font-family:var(--mono);font-size:10px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--slate);cursor:pointer;list-style:none}
details.capsule summary::-webkit-details-marker{display:none}
details.capsule summary::before{content:"\271A";margin-inline-end:8px;color:var(--slate)}
details.capsule[open] summary::before{content:"\2212"}
details.capsule[open]{border-color:color-mix(in srgb,var(--slate) 45%,transparent)}


/* ================= UPDATE BAR ================= */
.updatebar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(96px + var(--safe-bottom));
  z-index:120;display:flex;align-items:center;gap:12px;max-width:min(430px,92vw);
  background:var(--surface-2);border:1px solid var(--brass);border-radius:15px;
  padding:13px 14px;box-shadow:0 16px 40px -14px rgba(0,0,0,.7);
  animation:dealIn .45s var(--ease-spring) both}
@media (min-width:900px){ .updatebar{bottom:34px;left:auto;right:34px;transform:none} }
.updatebar .ub-tx{flex:1;min-width:0}
.updatebar .ub-tx b{display:block;font-family:var(--serif);font-size:15px;font-weight:500;margin-bottom:2px}
.updatebar .ub-tx span{font-size:12.5px;line-height:1.4;color:rgba(242,235,219,.65)}
.ub-go{flex-shrink:0;background:var(--brass);border:none;color:#231d10;border-radius:20px;
  padding:10px 16px;font-family:var(--mono);font-size:9.5px;letter-spacing:.09em;
  text-transform:uppercase;font-weight:700;cursor:pointer}
.buildstamp{font-family:var(--mono);font-size:14px;letter-spacing:.08em;color:var(--brass)}

/* ---------- RTL adjustments ---------- */
[dir=rtl] .tl{padding-left:0;padding-right:26px}
[dir=rtl] .tl::before{left:auto;right:6px}
[dir=rtl] .tl-item::before{left:auto;right:-24px}
[dir=rtl] .thread .n{float:left;margin:-2px 12px 0 0}
[dir=rtl] .rail-label::after{order:-1}
</style>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="wordmark"><span class="k" id="tagline">A diary that writes itself</span><span class="n">Curio</span></div>
      <div class="seal-mini"><span class="seal-dot" id="dot"></span><span id="netlabel">Offline-ready</span></div>
    </div>
    <div class="body" id="body"></div>
    <button class="fab" id="fab" aria-label="Keep a moment">+</button>
    <nav class="tabs" id="tabs"></nav>
  </div>

  <div class="sheet-bg" id="sheetbg"></div>
  <div class="sheet" id="sheet"></div>
  <div class="toast" id="toast"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
